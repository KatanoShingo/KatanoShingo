<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390" role="img" aria-label="Custom GitHub profile card placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <style>
      text { font-family: "Segoe UI", Ubuntu, Sans-Serif; }
    </style>
  </defs>
  <rect x="8" y="8" width="864" height="374" rx="14" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <text x="40" y="80" fill="#58a6ff" font-size="40" font-weight="700">Custom Profile Card</text>
  <text x="40" y="130" fill="#c9d1d9" font-size="24">GitHub Actions will update this card automatically.</text>
  <text x="40" y="168" fill="#8b949e" font-size="20">Run "Update Custom Profile Card" once to generate live stats.</text>
</svg>
