name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # 毎日自動更新
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stats画像の生成（ランク表示、全期間合算、0の項目は非表示）
      - name: Generate GitHub Stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=KatanoShingo&show_icons=true&theme=radical&count_private=true&include_all_commits=true&hide=issues,contribs&hide_border=true
          path: images/stats.svg
          token: ${{ secrets.GH_PAT }}

      # Top Languages画像の生成
      - name: Generate Top Languages SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=KatanoShingo&layout=compact&theme=radical&hide_border=true
          path: images/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.svg
          git commit -m "Update GitHub Stats" || echo "No changes to commit"
          git pull --rebase
          git push
